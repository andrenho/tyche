"""
expected_stack_top = 20

["Supertables"]
code = """
.assembly
.const
    0: "f"
.func 0
    newt        ; child table
    newt        ; super table
    pushc   0   ;   "f"
    pushf   1   ;   function 1
    setkv       ; super = { "f": func1 }
    sptb        ; child <== super
    pushc   0   ;   "f"
    getkv       ; child.f
    call    0   ; child.f()
    ret
.func 1
    pushi   30
    ret
"""
expected_stack_top = 30

["VM: integer expressions"]
template = """
.assembly
.func 0
    pushi   %
    pushi   %
    %
    ret
"""
scenarios = [
    { name = "Sum",                    parameters = [2, 5, "sum"],    expected_stack_top = 7 },
    { name = "Subtraction",            parameters = [2, 5, "sub"],    expected_stack_top = -3 },
    { name = "Multiplication",         parameters = [2, -5, "mul"],   expected_stack_top = -10 },
    { name = "Integer division",       parameters = [20, 3, "idiv"],  expected_stack_top = 6 },
    { name = "Division",               parameters = [21, 4, "div"],   expected_stack_top = 5.25 },
    { name = "Equality",               parameters = [5, 5, "eq"],     expected_stack_top = true },
    { name = "Inequality",             parameters = [5, 5, "neq"],    expected_stack_top = false },
    { name = "Less than",              parameters = [4, 5, "lt"],     expected_stack_top = true },
    { name = "Less than",              parameters = [5, 5, "lt"],     expected_stack_top = false },
    { name = "Less than or equal",     parameters = [4, 5, "lte"],    expected_stack_top = true },
    { name = "Less than or equal",     parameters = [5, 5, "lte"],    expected_stack_top = true },
    { name = "Greater than",           parameters = [5, 5, "gt"],     expected_stack_top = false },
    { name = "Greater than or equal",  parameters = [5, 5, "gte"],    expected_stack_top = true },
    { name = "Logical AND",            parameters = [20, 5, "and"],   expected_stack_top = 4 },
    { name = "Logical OR",             parameters = [20, 5, "or"],    expected_stack_top = 21 },
    { name = "Logical XOR",            parameters = [20, 5, "xor"],   expected_stack_top = 17 },
    { name = "Power",                  parameters = [2, 5, "pow"],    expected_stack_top = 32 },
    { name = "Shift left",             parameters = [2, 5, "shl"],    expected_stack_top = 64 },
    { name = "Shift right",            parameters = [20, 3, "shr"],   expected_stack_top = 2 },
    { name = "Modulo",                 parameters = [20, 3, "mod"],   expected_stack_top = 2 },
]

