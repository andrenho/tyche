["VM: jumps (jmp + bnz)"]
code = """
.assembly
.func 0
    jmp     @x1         ; 0
    pushi   5           ; 3
@x1:
    pushi   1           ; 5
    bnz     @x2         ; 7
    pushi   1           ; 10
    bz      @x3         ; 12
@x2:
    pushi   6           ; 15
    ret                 ; 17
@x3:
    pushi   7           ; 18
    ret                 ; 20
"""
expected_stack_top = 6

["VM: jumps (bz)"]
code = """
.assembly
.func 0
    jmp     @x1
    pushi   5
@x1:
    pushz
    bnz     @x2
    pushz
    bz      @x3
@x2:
    pushi   6
    ret
@x3:
    pushi   7
    ret
"""
expected_stack_top = 7

