#
# Direct (non-templated) tests. Each test is keyed by its name.
#

["VM: basic"]
code = """
.assembly
.func 0
    pushi   2
    pushi   3
    sum
    ret
"""
debug = true
expected_stack_size = 1
expected_stack_top = 5

