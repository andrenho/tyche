.func 0
    newa        ; []
    pushc 0
    seti  0     ; ["Hello"]
    pushi 42
    seti  1     ; ["Hello", 42]
    newa        ; ["Hello", 42] []
    pushc 0
    seti  0     ; ["Hello", 42] ["Hello"]
    pushi 42
    seti  1     ; ["Hello", 42] ["Hello", 42]
    pushi 0
    seti  2     ; ["Hello", 42] ["Hello", 42, 0]
    neq
    ret
"""
expected_stack_top = true

["VM: table equality"]
code = """
.assembly
.const
    0: "Hello"
    1: "a"
    2: "b"
.func 0
    newt        ; {}
    pushc 1
    pushc 0
    setkv       ; { a: "Hello" }
    pushc 2
    pushi 42
    setkv       ; { a: "Hello", b: 42 }
    newt        ; { a: "Hello", b: 42 } {}
    pushc 1
    pushc 0
    setkv       ; { a: "Hello", b: 42 } { a: "Hello" }
    pushc 2
    pushi 42
    setkv       ; { a: "Hello", b: 42 } { a: "Hello", b: 42 }
    eq
    ret
"""
expected_stack_top = true

