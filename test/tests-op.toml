["VM: iterate over arrays"]
code = """
.assembly
.func 0
    pushi   0           ; sum = 0

    newa                ; create array: [10, 20, 30]
    pushi   10
    appnd
    pushi   20
    appnd
    pushi   30
    appnd

    pushn
@startofloop:
    next                ; for i, v in array
    bnil    @endofloop

    dupv    0           ; push 'sum'
    sum
    set     0           ; sum += v, only key is left
    jmp     @startofloop

@endofloop:
    pop                 ; remove last nil
    dupv    0
    ret
"""
expected_stack_top = 60

["VM: tables"]
code = """
.assembly
.const
    0: "k1"
    1: "k2"
.func 0
    newt                ; table = { "k1": 10, "k2": 20 }
    pushc   0
    pushi   10
    setkv
    pushc   1
    pushi   20
    setkv

    pushc   1
    getkv
    ret
"""
expected_stack_top = 20

["VM: iterate over tables"]
code = """
.assembly
.const
    0: "k1"
    1: "k2"
.func 0
    pushi   0           ; sum = 0

    newt                ; table = { "k1": 10, "k2": 20 }
    pushc   0
    pushi   10
    setkv
    pushc   1
    pushi   20
    setkv

    pushn
@startofloop:
    next                ; for i, v in array
    bnil    @endofloop

    dupv    0           ; push 'sum'
    sum
    set     0           ; sum += v, only key is left
    jmp     @startofloop

@endofloop:
    pop                 ; remove last nil
    dupv    0
    ret
"""
expected_stack_top = 30

